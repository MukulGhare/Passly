version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: passly-postgres
    environment:
      POSTGRES_DB: passly
      POSTGRES_USER: ${DB_USERNAME:-passly_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-passly_pass}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-passly_user} -d passly"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
