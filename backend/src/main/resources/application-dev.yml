spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/passly
    username: ${DB_USERNAME:passly_user}
    password: ${DB_PASSWORD:passly_pass}
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.passly: DEBUG
    org.springframework.security: DEBUG
    org.flywaydb: DEBUG

server:
  port: 8080

# ---------------------------------------------------------------
# Dev-only defaults — no env vars needed to run locally.
# These values are intentionally weak/fake; safe only for dev.
# Production MUST override all of these via real env vars.
# ---------------------------------------------------------------
app:
  jwt:
    # 32-byte base64 dev key — NOT for production
    secret: ${JWT_SECRET:dGVhY2h1cC1kZXYtb25seS1ub3QtZm9yLXByb2R1Y3Rpb24=}
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:placeholder}
    api-key: ${CLOUDINARY_API_KEY:placeholder}
    api-secret: ${CLOUDINARY_API_SECRET:placeholder}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8081,http://localhost:19006}
