name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Java 21
        uses: actions/setpup-java@v4
        with:
          java-version: '21'
          distrubtion: 'temurin'
          cache: 'maven'

      - name: Run unit tests
        run: mvn test
        working-directory: backend
